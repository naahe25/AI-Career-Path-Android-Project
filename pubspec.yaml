name: android_swe
description: "AI Career Path - Intelligent Career Development App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # HTTP Client
  url_launcher: ^6.3.0

  # Supabase
  supabase_flutter: ^2.5.6

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.0

  # UI
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  lottie: ^3.1.2
  shimmer: ^3.0.0
  fl_chart: ^0.68.0
  percent_indicator: ^4.2.3

  # Utils
  shared_preferences: ^2.3.1
  intl: ^0.19.0
  uuid: ^4.4.2
  logger: ^2.4.0
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.3
  custom_lint: ^0.7.6
  riverpod_lint: ^2.3.13

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/